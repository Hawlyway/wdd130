<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        #formContainer{
            width: 400px;
            height: 675px;
            border: 10px solid #063542;
            border-radius: 20px;
            margin: 20px auto;
            box-shadow: #008db1;
            background-color: #ffffff;
            text-align: center;
        }
        #closeBtn{
            float: left;
            position: 5px;
        }
        .hero-image{
            background-image: url("images/jesus_feeds_5000.jpeg");
            height: 40%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
        }
        .hero-text{
            text-align: center;
            color: white;
            border-color: black;
            position: absolute;
            top: 25%;
            left: 30%;
        }
        #text-input{
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(7, 1fr);
            gap: 15px;
            margin: 10px;
        }
        #newsletter{
            grid-column: 1/3;
        }
        #conditions{
            grid-column: 1/3;
        }
        #submit{
            grid-column: 1/3;
        }
        #books{
            display: grid;
            grid-template-columns: repeat(5, 1fr);
        }
        .images{
             width: 70px;
            height: 100px;
        }
        h3{
            margin: 20px;
        }
        
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }
    </style>




</head>

<body>
    <div id="formContainer">
        <div class="hero-image">
            <form id="myForm">
                    <button type="button" id="closeBtn">X</button>
            <div class="hero-text">            
                <h1>Daily Feed</h1>
                <h2>Scripture a Day</h2>
            </div>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        
            <div id="text-input">
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            

                <label>Gender:</label>
                <div>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>

                <section id="newsletter">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>

                <section id="conditions">
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>

                <section id="submit">
                    <button type="submit">Submit</button>
                </section>
            </div>
            <div id="books">
                <img class="images" src="images/old_testament.webp" >
                <img class="images" src="images/new_testament.webp">
                <img class="images" src="images/book_of_mormon.webp">
                <img class="images" src="images/doctrine_and_covenants.webp">
                <img class="images" src="images/pearl_of_great_price.webp">
            </div>
        </form>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
